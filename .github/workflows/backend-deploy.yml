name: Backend CI/CD → Render

on:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (domain puro, sin BD)
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///./test.db   # sqlite solo para que pydantic-settings no falle al importar
          SECRET_KEY: test-secret-key-only-for-ci

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test          # solo despliega si los tests pasan

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
